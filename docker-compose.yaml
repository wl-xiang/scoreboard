# 比赛计分管理系统 - 容器编排
# 单命令启动：docker compose up -d --build
# 端口映射与服务端口均通过 PORT 环境变量自定义（默认 5000）

services:
  scoring:
    build: .
    image: qyjx/scoring-system:latest
    container_name: qyjx-scoring
    restart: unless-stopped
    ports:
      # 宿主机端口:容器端口，二者均由 PORT 控制，默认 5000
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      - PORT=${PORT:-5000}
      - SECRET_KEY=${SECRET_KEY:-qyjx-scoring-system-secret-2024}
      - PRESET_USERNAME=${PRESET_USERNAME:-qyjx}
      - PRESET_PASSWORD=${PRESET_PASSWORD:-qyjx}
      - DATA_DIR=/app/data
    volumes:
      # SQLite 数据库文件持久化到宿主机，避免容器销毁后数据丢失
      - ./data:/app/data
