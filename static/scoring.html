<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>计分 · 比赛计分管理系统</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="topbar" id="topbar"></header>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-head">
        <div>
          <a href="/index.html" class="text-muted" style="font-size:12px">← 返回比赛列表</a>
          <h1 id="s-title" style="margin-top:6px">计分</h1>
          <div class="sub" id="s-sub"></div>
        </div>
        <div class="flex gap" id="s-actions"></div>
      </div>

      <!-- 计分前置设置（未开始时） -->
      <div class="card" id="setup-card">
        <div class="card-title"><span class="bar"></span>计分前置确认</div>
        <p class="text-muted mb">请确认以下比赛配置，点击「开始计分」后将进入计分录入界面，且比赛属性与选手信息将被锁定。</p>
        <div class="form-row">
          <div class="form-group">
            <label>评委个数</label>
            <input id="judge-count-display" disabled>
            <div class="hint">评委个数在比赛创建时已设置，如需修改请返回详情页编辑。</div>
          </div>
          <div class="form-group">
            <label>当前选手数</label>
            <input id="player-count" disabled>
            <div class="hint">选手需在比赛详情页预先添加。</div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="startScoring()">开始计分</button>
      </div>

      <!-- 计分主界面（进行中时） -->
      <div id="scoring-ui" class="hide">
        <div class="card">
          <div class="card-title">
            <span class="bar"></span>计分规则
            <span class="text-muted" style="font-weight:400;font-size:12px;margin-left:auto">勾选后排行榜实时更新</span>
          </div>
          <div class="checkbox-row">
            <label><input type="checkbox" id="opt-remove-max" onchange="updateCalcOptions()"> 去掉一个最高分</label>
            <label><input type="checkbox" id="opt-remove-min" onchange="updateCalcOptions()"> 去掉一个最低分</label>
            <label><input type="checkbox" id="opt-remove-zero" onchange="updateCalcOptions()"> 去除无效评委评分（全 0 评分）</label>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <span class="bar"></span>实时排行榜
            <span class="text-muted" style="font-weight:400;font-size:12px;margin-left:auto" id="lb-tip"></span>
          </div>
          <div class="table-wrap">
            <table class="data" id="leaderboard-table">
              <thead id="lb-head"></thead>
              <tbody id="lb-body"></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <span class="bar"></span>计分记录
            <span style="margin-left:auto" class="flex gap-sm">
              <button class="btn btn-sm btn-primary" onclick="openScoreModal()">+ 添加计分</button>
              <button class="btn btn-sm btn-danger" onclick="finishScoring()">结束比赛</button>
            </span>
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead id="score-head"></thead>
              <tbody id="score-records"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/scoring.js"></script>
</body>
</html>
